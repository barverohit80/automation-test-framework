spring:
  profiles:
    active: ${TEST_ENV:dev}
    default: dev

app:
  environment: default
  base-url: "https://demoqa.com"

  browser:
    default: chrome
    headless: false
    implicit-wait-seconds: 10
    explicit-wait-seconds: 15
    page-load-timeout-seconds: 30

  parallel:
    enabled: true
    thread-count: 4
    cross-browser:
      enabled: false
      browsers:
        - chrome

  selenium-grid:
    enabled: false
    hub-url: "http://localhost:4444/wd/hub"

  timeouts:
    short: 5
    medium: 10
    long: 30

  reporting:
    screenshot-on-failure: true
    screenshot-dir: "target/screenshots"

  data:
    random-seed: 0
    alphanumeric-length: 10
    numeric-length: 8
    prefix: "AUTO"

  locators:
    resource-dir: "locators/"
    file-dir: "src/main/resources/locators/"

    # Exclude dynamic/generated elements from locators JSON
    # Comma-separated regex patterns to exclude dynamic IDs
    exclude-dynamic-ids: |
      ^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$,
      ^[a-f0-9]{32}$,
      ^[a-f0-9]{16}$,
      ^[a-z]+-[a-z0-9]{6,}$,
      ^(__[a-z]+-{1,2}[a-z0-9]+|_[a-z0-9]+)$

    # Minimum confidence score for locators (lower = accept more)
    min-confidence: 0.3

    # Require at least one stable identifier (id, name, data-testid, aria-label)
    # If true, elements with only classes/text content are excluded
    require-stable-identifier: true
