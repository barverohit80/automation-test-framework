spring:
  profiles:
    active: ${TEST_ENV:dev}
    default: dev

app:
  environment: default
  base-url: "https://demoqa.com"

  browser:
    default: chrome
    headless: false
    implicit-wait-seconds: 10
    explicit-wait-seconds: 15
    page-load-timeout-seconds: 30

  parallel:
    enabled: true
    thread-count: 4
    cross-browser:
      enabled: false
      browsers:
        - chrome

  selenium-grid:
    enabled: false
    hub-url: "http://localhost:4444/wd/hub"

  timeouts:
    short: 5
    medium: 10
    long: 30

  locators:
    resource-dir: "locators/"
    file-dir: "src/main/resources/locators/"

  reporting:
    screenshot-on-failure: true
    screenshot-dir: "target/screenshots"

  data:
    random-seed: 0
    alphanumeric-length: 10
    numeric-length: 8
    prefix: "AUTO"

# ═══════════ AI Test Generation ═══════════
# Switch provider: set testgen.llm.provider to "claude" (default) or "gemini"
testgen:
  llm:
    provider: ${LLM_PROVIDER:claude}
  pageobject:
    output-dir: "src/main/java/com/automation/pages/generated"
  feature:
    output-dir: "src/main/resources/features/generated"
  stepdef:
    output-dir: "src/main/java/com/automation/steps/generated"

# ── Claude (Anthropic) — active when testgen.llm.provider=claude ──
anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-6

# ── Gemini (Google) — active when testgen.llm.provider=gemini ──
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
