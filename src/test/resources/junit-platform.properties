# ═══════════════════════════════════════════════════════════════
#  Cucumber Parallel Execution Configuration
#  Read by JUnit Platform when running via: mvn test
# ═══════════════════════════════════════════════════════════════

# Enable parallel scenario execution
cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=4
cucumber.execution.parallel.config.fixed.max-pool-size=8

# Cucumber settings
cucumber.glue=com.automation
cucumber.features=src/main/resources/features
cucumber.plugin=pretty, html:target/cucumber-reports/report.html, json:target/cucumber-reports/report.json, timeline:target/cucumber-reports/timeline

# Publish report (disable to avoid the banner)
cucumber.publish.quiet=true
